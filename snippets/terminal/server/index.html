<!DOCTYPE html>
<html>
  <head>
    <title>Terminal Payment Demo</title>
    <style>
      button { margin: 4px; padding: 8px 16px; cursor: pointer; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      #log { margin-top: 16px; background: #f5f5f5; padding: 12px; font-family: monospace; font-size: 13px; white-space: pre; }
    </style>
  </head>
  <body>
    <h2>Stripe Terminal (Server-Driven)</h2>

    <div>
      <button id="btn-create-reader">Create Simulated Reader</button>
    </div>
    <div>
      <button id="btn-create-pi" disabled>Create Payment Intent ($20.00)</button>
    </div>
    <div>
      <button id="btn-process" disabled>Process Payment Intent</button>
    </div>
    <div>
      <button id="btn-simulate" disabled>Simulate Card Tap</button>
      <button id="btn-cancel" disabled>Cancel</button>
    </div>
    <div>
      <button id="btn-capture" disabled>Capture Payment</button>
    </div>
    <div>
      <button id="btn-reset" disabled>Reset</button>
    </div>

    <div id="log"></div>

    <script src="terminal.js"></script>
  </body>
</html>
